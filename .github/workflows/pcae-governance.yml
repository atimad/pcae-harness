name: PCAE Governance

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install project
        run: python -m pip install -e .

      - name: PCAE health
        run: pcae health --json

      - name: PCAE check
        run: pcae check --json

      - name: PCAE risk
        run: pcae analytics risk --json
