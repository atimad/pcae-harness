[protected]
patterns = [
  ".git/**",
  ".env",
  ".env.*",
  "*.pem",
  "*.key",
  "*.p12",
  "*.pfx",
  "**/__pycache__/**",
  ".venv/**",
  "venv/**",
  "node_modules/**",
  "pyproject.toml",
  "poetry.lock",
  "package-lock.json",
  "pnpm-lock.yaml",
  "yarn.lock",
  "Cargo.toml",
  "Cargo.lock",
]

[architecture.zones]
core = ["src/pcae/core/**"]
commands = ["src/pcae/commands/**"]
cli = ["src/pcae/cli.py", "src/pcae/__main__.py", "src/pcae/__init__.py"]
tests = ["tests/**"]
docs = ["docs/**", "*.md"]
tasks = ["tasks/**"]
scripts = ["scripts/**"]
hooks = [".githooks/**"]
package = ["pyproject.toml"]
session = [".pcae/session.json"]
policy = [".pcae/policy.toml"]
config = [".pcae/**", "pyproject.toml"]

[architecture.rules]
core = ["core"]
commands = ["core", "commands"]
cli = ["core", "commands", "cli"]
tests = ["*"]
docs = ["*"]
tasks = ["*"]
scripts = ["*"]
hooks = ["hooks"]
package = ["package"]
session = ["session"]
policy = ["policy"]
config = ["config"]

[architecture.enforcement]
mode = "advisory"

[agent]
stale_after_seconds = 14400

[daemon]
watch_interval_seconds = 300

[orchestration]
default_agent = "claude-local"
documentation_agent = "claude-local"
runtime_agent = "codex-local"
validation_agent = "pcae-native"
