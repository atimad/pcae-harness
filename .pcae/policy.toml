[protected]
patterns = [
  ".git/**",
  ".env",
  ".env.*",
  "*.pem",
  "*.key",
  "*.p12",
  "*.pfx",
  "**/__pycache__/**",
  ".venv/**",
  "venv/**",
  "node_modules/**",
  "pyproject.toml",
  "poetry.lock",
  "package-lock.json",
  "pnpm-lock.yaml",
  "yarn.lock",
  "Cargo.toml",
  "Cargo.lock",
]

[architecture.zones]
core = ["src/pcae/core/**"]
commands = ["src/pcae/commands/**"]
tests = ["tests/**"]
docs = ["docs/**", "*.md"]
tasks = ["tasks/**"]
config = [".pcae/**", "pyproject.toml"]

[architecture.rules]
core = ["core"]
commands = ["core", "commands"]
tests = ["*"]
docs = ["*"]
tasks = ["*"]
config = ["config"]

[architecture.enforcement]
mode = "advisory"
